<body>
  <!-- Splash overlay — 3D box reveal, click envelops screen → title -->
  <div id="splash-overlay" class="hidden">
    <!-- Water-cursor FX layer (droplet spray follows pointer).
         Positioned absolutely behind the box, pointer-events: none so
         clicks pass through to the 3D box beneath. Driven by
         SplashScreen.update() via WaterCursorFX.tick/render. -->
    <canvas id="splash-fx-canvas"
            style="position:absolute;inset:0;width:100%;height:100%;
                   pointer-events:none;z-index:1;"></canvas>
    <div class="splash-title" id="splash-title-text">DUNGEON GLEANER</div>
    <div class="box3d-wrap splash-variant" id="splash-box">
      <div class="box3d-scene">
        <div class="box3d-spin spinning">
          <!-- Interior glow — 3 intersecting planes simulate orb -->
          <div class="box3d-glow">
            <div class="glow-plane gp0"></div>
            <div class="glow-plane gp1"></div>
            <div class="glow-plane gp2"></div>
          </div>
          <!-- 5 solid faces -->
          <div class="box3d-face bf-back"></div>
          <div class="box3d-face bf-left"></div>
          <div class="box3d-face bf-right"></div>
          <div class="box3d-face bf-bottom"></div>
          <div class="box3d-face bf-top"></div>
          <!-- Lid (front face, hinged at bottom) -->
          <div class="box3d-lid">
            <div class="box3d-face"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="splash-subtitle" id="splash-subtitle-text">DC JAM 2026</div>
    <div class="splash-secret" id="splash-secret-text">THE DRAGONS REMEMBER</div>
    <div class="splash-prompt" id="splash-prompt-text">PRESS ANY KEY</div>
  </div>

  <div id="game-container">
    <div id="viewport">
      <canvas id="view-canvas"></canvas>

      <!-- Vestigial HUD stubs — kept minimal for HUD.js API compat -->
      <div id="hud" style="display:none">
        <span id="hud-hp"></span><span id="hud-energy"></span>
        <div id="hud-hp-fill"></div><div id="hud-energy-fill"></div>
        <span id="hud-floor"></span><span id="hud-advantage"></span>
        <span id="hud-battery-pips"></span>
      </div>

      <!-- Combat overlay -->
      <div id="combat-overlay">
        <div id="combat-log"></div>
      </div>

      <!-- Floor transition -->
      <div id="floor-transition">
        <span id="floor-transition-text">Descending...</span>
      </div>

      <!-- CRT overlays (scanlines + vignette) -->
      <div id="crt-scanlines"></div>
      <div id="crt-vignette"></div>

      <!-- Debrief Feed (left column, hidden until gameplay) -->
      <div id="debrief-feed" style="display:none">
        <div class="df-header" id="df-header">MOK</div>
        <div class="df-content" id="df-content"></div>
      </div>

      <!-- Quick Bar (below debrief, hidden until gameplay) -->
      <div id="quick-bar" style="display:none">
        <div class="qb-slot qb-empty" id="qb-0" data-slot="0">
          <span class="qb-icon">—</span><span class="qb-label">EMPTY</span>
        </div>
        <div class="qb-slot qb-empty" id="qb-1" data-slot="1">
          <span class="qb-icon">—</span><span class="qb-label">EMPTY</span>
        </div>
        <div class="qb-slot qb-empty" id="qb-2" data-slot="2">
          <span class="qb-icon">—</span><span class="qb-label">EMPTY</span>
        </div>
      </div>

      <!-- NCH Widget (draggable card-stack capsule, hidden until gameplay) -->
      <div id="nch-widget" class="nch-idle">
        <div class="nch-stack" id="nch-stack"></div>
        <div class="nch-badges" id="nch-badges">
          <div class="nch-badge" id="nch-badge-bag">BAG <span>0/12</span></div>
          <div class="nch-badge" id="nch-badge-deck">DECK <span>0</span></div>
        </div>
      </div>

      <!-- Combat Report Overlay (hidden until post-combat) -->
      <div id="combat-report">
        <div id="cr-content"></div>
      </div>

      <!-- Minimap embed (right-side HUD frame, always visible during gameplay) -->
      <div id="minimap-frame" style="display:none">
        <canvas id="minimap"></canvas>
        <div id="minimap-expand" title="Expand map">\u26F6</div>
        <button id="sb-map" class="minimap-compass-btn" title="Toggle Map (M)">N</button>
        <div id="minimap-time-strip">
          <span id="mts-day"></span>
          <span id="mts-phase"></span>
          <span id="mts-time"></span>
          <span id="mts-heading"></span>
        </div>
        <div id="minimap-floor-label"></div>
      </div>

      <!-- D-pad movement controls — CSS monochrome arrows -->
      <div id="dpad-frame" style="display:none">
        <div class="dpad-btn" id="dpad-turn-l" title="Turn Left — Q / ← / L-Bumper">&#x21B6;</div>
